<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>УРОК / Таймер занятия</title>
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="УРОК">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --paper: #f4f3ee;
    --ink: #0a0a0a;
    --line: #d8d6cc;
    --line-d: #c2bfb2;
    --muted: #8a877c;
    --accent: #ff4d1c;
    --warn: #e8a23d;
    /* типы блоков */
    --t-active: #ff4d1c;   /* активный — оранжевый */
    --t-calm:   #3d7fb3;   /* спокойный — синий */
    --t-create: #6b8f3d;   /* творческий — зелёный */
    --t-rest:   #9a6fb0;   /* разрядка — фиолетовый */
    --mono: 'Space Mono', monospace;
    --sans: 'Archivo', sans-serif;
    --exp: 'Archivo Expanded', 'Archivo', sans-serif;
  }

  html, body { background: var(--bg); }
  body {
    color: var(--ink); font-family: var(--mono); font-size: 12px;
    min-height: 100vh; background: var(--paper);
    display: flex; justify-content: center; align-items: flex-start;
    padding: 20px 16px 40px; -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: 100%; max-width: 600px; background: var(--paper);
    border: 1.5px solid var(--ink); position: relative;
  }
  .frame::before, .frame::after {
    content: ''; position: absolute; width: 8px; height: 8px;
    border: 1.5px solid var(--ink); background: var(--paper);
  }
  .frame::before { top: -5px; left: -5px; }
  .frame::after { bottom: -5px; right: -5px; }

  /* MASTHEAD */
  .masthead {
    border-bottom: 1.5px solid var(--ink); padding: 14px 18px 12px;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .mast-left { line-height: 1; }
  .mast-title { font-family: var(--exp); font-weight: 900; font-size: 34px; letter-spacing: -.01em; line-height: .82; }
  .mast-title .slash { color: var(--accent); }
  .mast-sub { font-family: var(--mono); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-top: 7px; }
  .mast-right { text-align: right; }
  .mast-clock { font-family: var(--exp); font-weight: 800; font-size: 20px; line-height: .9; letter-spacing: -.01em; }
  .mast-date { font-size: 8px; letter-spacing: .1em; color: var(--muted); margin-top: 4px; }

  /* TABS */
  .tabs { display: flex; border-bottom: 1.5px solid var(--ink); }
  .tab {
    flex: 1; background: var(--paper); border: none; border-right: 1.5px solid var(--ink);
    font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .18em;
    text-transform: uppercase; padding: 11px 0; cursor: pointer; color: var(--muted); transition: all .12s;
  }
  .tab:last-child { border-right: none; }
  .tab:hover { background: #ebe9e1; color: var(--ink); }
  .tab.active { background: var(--ink); color: var(--paper); }

  .view { display: none; }
  .view.active { display: block; }

  /* SECTION LABELS */
  .ed-section-label {
    display: flex; align-items: center; gap: 8px; padding: 14px 18px 10px;
    font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted);
  }
  .ed-section-label .num { font-family: var(--exp); font-weight: 800; color: var(--ink); font-size: 11px; }
  .ed-section-label .rule { flex: 1; height: 1px; background: var(--line-d); }

  /* TEMPLATE CATEGORIES */
  .tpl-cats { display: flex; flex-wrap: wrap; padding: 0 18px 10px; gap: 0; }
  .tpl-cat {
    flex: 1; min-width: 33%; background: var(--paper); border: 1.5px solid var(--ink);
    font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; padding: 8px 4px; cursor: pointer; color: var(--muted); transition: all .12s;
    border-left: none;
  }
  .tpl-cat:first-child { border-left: 1.5px solid var(--ink); }
  .tpl-cat:hover { color: var(--ink); }
  .tpl-cat.active { background: var(--ink); color: var(--paper); }

  .templates { display: grid; grid-template-columns: 1fr 1fr; padding: 0 18px 4px; gap: 0; }
  .templates.cols3 { grid-template-columns: 1fr 1fr 1fr; }
  .tpl-btn {
    background: var(--paper); border: 1.5px solid var(--ink); margin: -0.75px 0 0 -0.75px;
    font-family: var(--exp); font-weight: 700; font-size: 13px; letter-spacing: .02em;
    padding: 12px 4px; cursor: pointer; color: var(--ink); transition: all .12s;
  }
  .tpl-btn small { display: block; font-family: var(--mono); font-weight: 400; font-size: 8px; letter-spacing: .1em; color: var(--muted); margin-top: 3px; text-transform: uppercase; }
  .tpl-btn:hover { background: var(--ink); color: var(--paper); }
  .tpl-btn:hover small { color: #b8b5aa; }

  /* BLOCKS LIST */
  .blocks-list { padding: 0 18px; }
  .block-row {
    display: grid; grid-template-columns: 22px 8px 1fr 86px 64px 26px;
    gap: 6px; align-items: stretch; border-bottom: 1px solid var(--line); padding: 3px 0;
  }
  .row-idx { font-family: var(--exp); font-weight: 800; font-size: 13px; color: var(--line-d); display: flex; align-items: center; justify-content: center; }
  .row-type-bar { border-radius: 1px; background: var(--line-d); }
  .block-row input[type="text"] {
    background: transparent; border: none; color: var(--ink); font-family: var(--sans);
    font-weight: 600; font-size: 15px; padding: 9px 4px; outline: none; letter-spacing: -.01em; min-width: 0;
  }
  .block-row input[type="text"]::placeholder { color: var(--line-d); }
  .type-select {
    background: transparent; border: none; outline: none; cursor: pointer;
    font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; color: var(--muted); -webkit-appearance: none; appearance: none;
    text-align: right; padding-right: 2px;
  }
  .dur-wrap { display: flex; align-items: center; gap: 3px; justify-content: flex-end; }
  .block-row input[type="number"] {
    width: 38px; background: transparent; border: none; color: var(--accent);
    font-family: var(--exp); font-weight: 800; font-size: 16px; text-align: right;
    padding: 0; outline: none; -moz-appearance: textfield;
  }
  .block-row input[type="number"]::-webkit-outer-spin-button,
  .block-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .dur-unit { font-size: 8px; color: var(--muted); letter-spacing: .08em; }
  .del-btn { background: none; border: none; color: var(--line-d); cursor: pointer; font-size: 17px; line-height: 1; transition: color .12s; display: flex; align-items: center; justify-content: center; }
  .del-btn:hover { color: var(--accent); }
  /* warning flag on a row */
  .block-row.flag .row-idx { color: var(--warn); }

  .add-btn {
    width: calc(100% - 36px); margin: 12px 18px 0; background: var(--paper);
    border: 1.5px dashed var(--line-d); font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: .16em; text-transform: uppercase; padding: 11px; cursor: pointer; color: var(--muted); transition: all .12s;
  }
  .add-btn:hover { border-color: var(--ink); border-style: solid; color: var(--ink); }

  /* AGE + ANALYSIS PANEL */
  .age-row { display: flex; padding: 0 18px 4px; gap: 0; }
  .age-btn {
    flex: 1; background: var(--paper); border: 1.5px solid var(--ink); border-left: none;
    font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    padding: 7px 2px; cursor: pointer; color: var(--muted); transition: all .12s;
  }
  .age-btn:first-child { border-left: 1.5px solid var(--ink); }
  .age-btn small { display:block; font-weight:400; font-size:7px; color: var(--line-d); margin-top:2px; }
  .age-btn:hover { color: var(--ink); }
  .age-btn.active { background: var(--ink); color: var(--paper); }
  .age-btn.active small { color:#b8b5aa; }

  .analysis { padding: 4px 18px 0; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; padding: 8px 0 12px; border-bottom: 1px solid var(--line); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 9px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 2px; }
  .balance-bar { display: flex; height: 8px; margin: 12px 0 6px; border: 1.5px solid var(--ink); overflow: hidden; }
  .balance-seg { transition: flex .3s; }
  .hints { margin-top: 8px; display: flex; flex-direction: column; gap: 5px; }
  .hint {
    font-family: var(--mono); font-size: 10px; line-height: 1.35; letter-spacing: .01em;
    padding: 7px 9px; border: 1px solid var(--line-d); display: flex; gap: 7px; align-items: flex-start;
  }
  .hint.warn { border-color: var(--warn); background: rgba(232,162,61,.08); }
  .hint.ok { border-color: var(--line-d); color: var(--muted); }
  .hint .ic { flex-shrink: 0; font-weight: 700; }
  .hint.warn .ic { color: var(--warn); }

  /* FOOTER */
  .ed-footer { margin-top: 16px; border-top: 1.5px solid var(--ink); display: flex; align-items: stretch; }
  .total-box { flex: 1; padding: 14px 18px; display: flex; align-items: baseline; gap: 10px; border-right: 1.5px solid var(--ink); }
  .total-lbl { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
  .total-val { font-family: var(--exp); font-weight: 900; font-size: 28px; letter-spacing: -.02em; line-height: 1; }
  .total-val .u { font-family: var(--mono); font-weight: 400; font-size: 10px; color: var(--muted); margin-left: 4px; letter-spacing: .1em; }
  .start-btn {
    background: var(--ink); color: var(--paper); border: none; font-family: var(--exp); font-weight: 800;
    font-size: 14px; letter-spacing: .04em; padding: 0 26px; cursor: pointer; transition: background .12s;
    display: flex; align-items: center; gap: 8px;
  }
  .start-btn:hover { background: var(--accent); }
  .start-btn .arr { font-size: 18px; }

  /* TIMER */
  .progress-strip { display: flex; border-bottom: 1.5px solid var(--ink); height: 26px; }
  .ps-seg { flex: var(--w); border-right: 1px solid rgba(255,255,255,.25); position: relative; overflow: hidden; transition: opacity .3s; }
  .ps-seg:last-child { border-right: none; }
  .ps-seg.done { opacity: .9; }
  .ps-seg.upcoming { opacity: .32; }
  .ps-seg.active .ps-fill { position: absolute; top:0; left:0; height:100%; background: rgba(10,10,10,.32); transition: width .9s linear; }
  .ps-seg .ps-n { position: absolute; top: 50%; left: 5px; transform: translateY(-50%); font-family: var(--mono); font-size: 8px; color: rgba(255,255,255,.9); z-index: 2; font-weight: 700; }

  .timer-meta { display: flex; justify-content: space-between; align-items: center; padding: 9px 18px; border-bottom: 1.5px solid var(--ink); font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  .timer-meta b { font-family: var(--exp); font-weight: 800; color: var(--ink); font-size: 11px; letter-spacing: .04em; }

  .stage { padding: 22px 18px 20px; position: relative; border-bottom: 1.5px solid var(--ink); }
  .stage-tag { font-family: var(--mono); font-size: 9px; letter-spacing: .16em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .stage-tag .br { color: var(--ink); }
  .stage-type { display: inline-flex; align-items: center; gap: 5px; font-size: 9px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; }
  .stage-type .legend-dot { width: 8px; height: 8px; }
  .stage-name { font-family: var(--exp); font-weight: 800; font-size: clamp(22px, 6.5vw, 36px); line-height: .92; letter-spacing: -.02em; margin-bottom: 18px; word-break: break-word; }
  .clock-row { display: flex; align-items: flex-end; justify-content: space-between; }
  .clock { font-family: var(--exp); font-weight: 900; font-size: clamp(56px, 19vw, 104px); line-height: .8; letter-spacing: -.04em; font-variant-numeric: tabular-nums; transition: color .2s; }
  .clock.warn { color: var(--warn); }
  .clock.urgent { color: var(--accent); animation: blink 1s steps(2,end) infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .clock-side { text-align: right; padding-bottom: 8px; }
  .clock-side .of { font-size: 9px; letter-spacing: .1em; color: var(--muted); }
  .clock-side .of b { font-family: var(--exp); font-weight: 800; font-size: 16px; color: var(--ink); display: block; }

  .controls { display: flex; border-bottom: 1.5px solid var(--ink); }
  .ctrl-btn { flex: 1; background: var(--paper); border: none; border-right: 1.5px solid var(--ink); font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; padding: 14px 4px; cursor: pointer; color: var(--ink); transition: all .12s; }
  .ctrl-btn:last-child { border-right: none; }
  .ctrl-btn:hover:not(:disabled) { background: #ebe9e1; }
  .ctrl-btn.primary { background: var(--ink); color: var(--paper); flex: 1.6; }
  .ctrl-btn.primary:hover { background: var(--accent); }
  .ctrl-btn:disabled { color: var(--line-d); cursor: default; }

  .queue-head { padding: 12px 18px 8px; font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .queue-head .rule { flex: 1; height: 1px; background: var(--line-d); }
  .queue { padding: 0 18px 18px; }
  .queue-item { display: grid; grid-template-columns: 8px 16px 1fr auto; gap: 9px; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--line); transition: opacity .2s; }
  .queue-item:last-child { border-bottom: none; }
  .qi-bar { width: 4px; height: 18px; border-radius: 1px; background: var(--line-d); }
  .qi-mark { font-family: var(--mono); font-size: 9px; color: var(--line-d); }
  .queue-item.done-item { opacity: .35; }
  .queue-item.done-item .qi-mark { color: var(--ink); }
  .queue-item.next .qi-mark { color: var(--accent); }
  .qi-name { font-family: var(--sans); font-weight: 600; font-size: 14px; letter-spacing: -.01em; }
  .queue-item.done-item .qi-name { text-decoration: line-through; text-decoration-color: var(--line-d); }
  .qi-dur { font-family: var(--mono); font-size: 11px; color: var(--muted); }

  /* DONE */
  .done-screen { padding: 50px 18px 44px; text-align: center; }
  .done-mark { font-family: var(--exp); font-weight: 900; font-size: 16px; letter-spacing: .3em; color: var(--accent); margin-bottom: 14px; }
  .done-title { font-family: var(--exp); font-weight: 900; font-size: clamp(30px,9vw,54px); line-height: .85; letter-spacing: -.03em; margin-bottom: 14px; }
  .done-sub { font-family: var(--mono); font-size: 11px; letter-spacing: .08em; color: var(--muted); }
  .done-sub b { color: var(--ink); }
  .done-btn { margin-top: 28px; background: var(--ink); color: var(--paper); border: none; font-family: var(--mono); font-size: 10px; font-weight: 700; letter-spacing: .16em; text-transform: uppercase; padding: 12px 28px; cursor: pointer; transition: background .12s; }
  .done-btn:hover { background: var(--accent); }

  /* FOOTER STRIP */
  .footer-strip { display: flex; align-items: center; justify-content: space-between; padding: 8px 18px; border-top: 1.5px solid var(--ink); font-family: var(--mono); font-size: 8px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  .barcode { display: flex; gap: 1px; height: 12px; align-items: stretch; }
  .barcode span { width: 1px; background: var(--ink); }

  /* ══════════ RESPONSIVE ══════════ */
  @media (min-width: 860px) and (orientation: landscape) {
    body { align-items: stretch; padding: 0; }
    .frame { max-width: none; width: 100%; min-height: 100vh; border: none; display: flex; flex-direction: column; }
    .frame::before, .frame::after { display: none; }
    .mast-title { font-size: clamp(42px, 4vw, 64px); }
    .mast-clock { font-size: clamp(24px, 2.4vw, 36px); }
    .tabs { flex-shrink: 0; }

    #editor-view { display: none; }
    #editor-view.active {
      display: grid; flex: 1;
      grid-template-columns: 1.25fr 1fr;
      grid-template-rows: auto auto 1fr auto auto;
      grid-template-areas:
        "blk-lbl tpl-lbl"
        "blocks  tpls"
        "blocks  analysis"
        "add     analysis"
        "foot    foot"
        "strip   strip";
    }
    #ed-blocks-label { grid-area: blk-lbl; }
    #editor-view > .blocks-list { grid-area: blocks; align-content: start; }
    #editor-view > .add-btn { grid-area: add; align-self: start; }
    #ed-tpl-label { grid-area: tpl-lbl; border-left: 1.5px solid var(--ink); padding-left: 18px; }
    #ed-tpl-zone { grid-area: tpls; align-content: start; border-left: 1.5px solid var(--ink); }
    #ed-analysis-zone { grid-area: analysis; border-left: 1.5px solid var(--ink); }
    #editor-view > .ed-footer { grid-area: foot; }
    #editor-view > .footer-strip { grid-area: strip; }

    #timer-content.layout-wide {
      display: grid; flex: 1; grid-template-columns: 1.4fr 1fr;
      grid-template-rows: auto auto 1fr auto auto auto;
      grid-template-areas: "strip strip" "meta meta" "stage queue" "ctrl queue" "stop queue" "foot foot";
    }
    #timer-content.layout-wide .progress-strip { grid-area: strip; }
    #timer-content.layout-wide .timer-meta { grid-area: meta; }
    #timer-content.layout-wide .stage { grid-area: stage; border-right: 1.5px solid var(--ink); display: flex; flex-direction: column; justify-content: center; }
    #timer-content.layout-wide .controls { grid-area: ctrl; border-right: 1.5px solid var(--ink); }
    #timer-content.layout-wide .stop-wrap { grid-area: stop; border-right: 1.5px solid var(--ink); }
    #timer-content.layout-wide .queue-head { grid-area: queue; align-self: start; }
    #timer-content.layout-wide .queue { grid-area: queue; align-self: start; margin-top: 40px; overflow-y: auto; }
    #timer-content.layout-wide .footer-strip { grid-area: foot; }
    #timer-content.layout-wide .clock { font-size: clamp(80px, 12vw, 160px); }
    #timer-content.layout-wide .stage-name { font-size: clamp(30px, 4vw, 56px); }
  }

  @media (max-width: 380px) {
    body { padding: 12px 8px 28px; }
    .mast-title { font-size: 28px; }
    .stage { padding: 18px 14px; }
    .blocks-list, .queue, .masthead, .timer-meta, .ed-section-label, .queue-head, .footer-strip, .analysis, .tpl-cats, .templates, .age-row { padding-left: 14px; padding-right: 14px; }
    .block-row { grid-template-columns: 18px 6px 1fr 72px 52px 22px; gap: 4px; }
  }

  @media (orientation: landscape) and (max-height: 480px) {
    body { padding: 8px; align-items: flex-start; }
    .clock { font-size: clamp(44px, 13vh, 80px); }
    .stage { padding: 14px 18px; }
    .stage-name { font-size: clamp(18px, 5vh, 30px); margin-bottom: 12px; }
    .ctrl-btn { padding: 10px 4px; }
  }
</style>
</head>
<body>
<div class="frame">

  <div class="masthead">
    <div class="mast-left">
      <div class="mast-title"><span class="slash">/</span>УРОК</div>
      <div class="mast-sub">Конструктор тайминга занятия</div>
    </div>
    <div class="mast-right">
      <div class="mast-clock" id="live-clock">00:00</div>
      <div class="mast-date" id="live-date">— — —</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="t-editor" onclick="showView('editor')">01 / Конструктор</button>
    <button class="tab" id="t-timer" onclick="showView('timer')">02 / Таймер</button>
  </div>

  <!-- EDITOR -->
  <div class="view active" id="editor-view">

    <div class="ed-section-label" id="ed-tpl-label"><span class="num">(A)</span> Пресеты<span class="rule"></span></div>
    <div id="ed-tpl-zone">
      <div class="tpl-cats" id="tpl-cats"></div>
      <div class="templates" id="tpl-grid"></div>
    </div>

    <div class="ed-section-label" id="ed-blocks-label"><span class="num">(B)</span> Блоки занятия<span class="rule"></span></div>
    <div class="blocks-list" id="blocks-list"></div>
    <button class="add-btn" onclick="addBlock()">+ Добавить блок</button>

    <div id="ed-analysis-zone">
      <div class="ed-section-label"><span class="num">(C)</span> Динамика внимания<span class="rule"></span></div>
      <div class="age-row" id="age-row"></div>
      <div class="analysis" id="analysis"></div>
    </div>

    <div class="ed-footer">
      <div class="total-box">
        <span class="total-lbl">Итого</span>
        <span class="total-val" id="total-val">0<span class="u">мин</span></span>
      </div>
      <button class="start-btn" onclick="startTimer()">Запустить<span class="arr">→</span></button>
    </div>

    <div class="footer-strip">
      <span>УРОК / GRID v3</span>
      <div class="barcode" id="barcode1"></div>
    </div>
  </div>

  <!-- TIMER -->
  <div class="view" id="timer-view"><div id="timer-content"></div></div>

</div>

<script>
/* ───────── ТИПЫ БЛОКОВ ───────── */
var TYPES = {
  active: { label:'Активный',  color:'var(--t-active)', load:2 },
  calm:   { label:'Спокойный', color:'var(--t-calm)',   load:1 },
  create: { label:'Творческий',color:'var(--t-create)', load:1 },
  rest:   { label:'Разрядка',  color:'var(--t-rest)',   load:0 }
};
var TYPE_KEYS = ['active','calm','create','rest'];

/* ───────── ВОЗРАСТНЫЕ ЛИМИТЫ ВНИМАНИЯ (мин на один блок) ───────── */
var AGES = {
  junior: { label:'Начальная', sub:'1–4 кл', focus:12 },
  middle: { label:'Средняя',   sub:'5–8 кл', focus:18 },
  senior: { label:'Старшая',   sub:'9–11 кл', focus:25 }
};
var currentAge = 'middle';

/* ───────── ПРЕСЕТЫ ───────── */
/* каждый блок: {name, min, type} */
var CATS = [
  { id:'primary', label:'Начальная' },
  { id:'second',  label:'Средняя/ст.' },
  { id:'extra',   label:'Доп. / кружки' }
];
var PRESETS = {
  primary: [
    { id:'p40', label:'40', sub:'урок', blocks:[
      {name:'Оргмомент',min:3,type:'calm'},
      {name:'Разминка',min:5,type:'active'},
      {name:'Новый материал',min:12,type:'calm'},
      {name:'Физкультминутка',min:3,type:'rest'},
      {name:'Закрепление',min:10,type:'create'},
      {name:'Итог и рефлексия',min:5,type:'calm'},
      {name:'Запись задания',min:2,type:'calm'}
    ]},
    { id:'p45', label:'45', sub:'урок', blocks:[
      {name:'Оргмомент',min:3,type:'calm'},
      {name:'Разминка',min:5,type:'active'},
      {name:'Новый материал',min:13,type:'calm'},
      {name:'Физкультминутка',min:3,type:'rest'},
      {name:'Практика',min:12,type:'create'},
      {name:'Игра-закрепление',min:5,type:'active'},
      {name:'Итог',min:4,type:'calm'}
    ]}
  ],
  second: [
    { id:'s45', label:'45', sub:'урок', blocks:[
      {name:'Оргмомент',min:2,type:'calm'},
      {name:'Актуализация',min:6,type:'active'},
      {name:'Новый материал',min:15,type:'calm'},
      {name:'Разрядка',min:2,type:'rest'},
      {name:'Практика',min:13,type:'create'},
      {name:'Итог и рефлексия',min:5,type:'calm'},
      {name:'Задание',min:2,type:'calm'}
    ]},
    { id:'s90', label:'90', sub:'пара', blocks:[
      {name:'Оргмомент',min:3,type:'calm'},
      {name:'Актуализация',min:8,type:'active'},
      {name:'Теория · ч.1',min:18,type:'calm'},
      {name:'Разрядка',min:4,type:'rest'},
      {name:'Практика · ч.1',min:18,type:'create'},
      {name:'Перерыв',min:5,type:'rest'},
      {name:'Теория · ч.2',min:14,type:'calm'},
      {name:'Практика · ч.2',min:14,type:'create'},
      {name:'Итог',min:6,type:'calm'}
    ]}
  ],
  extra: [
    { id:'e60', label:'60', sub:'занятие', blocks:[
      {name:'Сбор и настрой',min:5,type:'calm'},
      {name:'Энерджайзер',min:7,type:'active'},
      {name:'Основная часть',min:25,type:'create'},
      {name:'Разрядка',min:5,type:'rest'},
      {name:'Закрепление',min:13,type:'create'},
      {name:'Рефлексия',min:5,type:'calm'}
    ]},
    { id:'e90', label:'90', sub:'занятие', blocks:[
      {name:'Сбор и настрой',min:6,type:'calm'},
      {name:'Энерджайзер',min:9,type:'active'},
      {name:'Блок · ч.1',min:25,type:'create'},
      {name:'Перерыв',min:7,type:'rest'},
      {name:'Блок · ч.2',min:25,type:'create'},
      {name:'Игра',min:10,type:'active'},
      {name:'Рефлексия',min:8,type:'calm'}
    ]},
    { id:'tutor', label:'50', sub:'репетитор', blocks:[
      {name:'Разбор ДЗ',min:10,type:'calm'},
      {name:'Новая тема',min:15,type:'calm'},
      {name:'Разрядка',min:3,type:'rest'},
      {name:'Решение задач',min:17,type:'create'},
      {name:'Итог и план',min:5,type:'calm'}
    ]}
  ]
};
var currentCat = 'second';

/* ───────── STATE ───────── */
var blocks = [];
var ts = null;

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function pad2(n){ return n<10?'0'+n:''+n; }
function fmt(s){ return pad2(Math.floor(s/60))+':'+pad2(s%60); }

/* ───────── ПРЕСЕТЫ UI ───────── */
function renderCats(){
  var c=document.getElementById('tpl-cats'); c.innerHTML='';
  CATS.forEach(function(cat){
    var b=document.createElement('button');
    b.className='tpl-cat'+(cat.id===currentCat?' active':'');
    b.textContent=cat.label;
    b.onclick=function(){ currentCat=cat.id; renderCats(); renderPresets(); };
    c.appendChild(b);
  });
}
function renderPresets(){
  var g=document.getElementById('tpl-grid');
  var list=PRESETS[currentCat];
  g.className='templates'+(list.length>2?' cols3':'');
  g.innerHTML='';
  list.forEach(function(p){
    var b=document.createElement('button');
    b.className='tpl-btn';
    b.innerHTML=escHtml(p.label)+'<small>'+escHtml(p.sub)+'</small>';
    b.onclick=function(){ loadPreset(currentCat,p.id); };
    g.appendChild(b);
  });
}
function loadPreset(cat,id){
  var p=PRESETS[cat].find(function(x){return x.id===id;});
  if(!p)return;
  blocks=p.blocks.map(function(b){return {name:b.name,min:b.min,type:b.type};});
  renderEditor();
}

/* ───────── ВОЗРАСТ UI ───────── */
function renderAges(){
  var r=document.getElementById('age-row'); r.innerHTML='';
  Object.keys(AGES).forEach(function(k){
    var a=AGES[k];
    var b=document.createElement('button');
    b.className='age-btn'+(k===currentAge?' active':'');
    b.innerHTML=escHtml(a.label)+'<small>'+escHtml(a.sub)+' · ~'+a.focus+' мин</small>';
    b.onclick=function(){ currentAge=k; renderAges(); renderAnalysis(); };
    r.appendChild(b);
  });
}

/* ───────── СПИСОК БЛОКОВ ───────── */
function renderEditor(){
  var list=document.getElementById('blocks-list'); list.innerHTML='';
  blocks.forEach(function(b,i){
    if(!b.type) b.type='calm';
    var t=TYPES[b.type];
    var over = b.min > AGES[currentAge].focus && t.load>=1;
    var row=document.createElement('div'); row.className='block-row'+(over?' flag':'');
    var opts=TYPE_KEYS.map(function(k){
      return '<option value="'+k+'"'+(k===b.type?' selected':'')+'>'+TYPES[k].label+'</option>';
    }).join('');
    row.innerHTML=
      '<div class="row-idx">'+pad2(i+1)+'</div>'+
      '<div class="row-type-bar" style="background:'+t.color+'"></div>'+
      '<input type="text" value="'+escHtml(b.name)+'" placeholder="название блока" oninput="blocks['+i+'].name=this.value">'+
      '<select class="type-select" style="color:'+t.color+'" onchange="blocks['+i+'].type=this.value;renderEditor()">'+opts+'</select>'+
      '<div class="dur-wrap"><input type="number" value="'+b.min+'" min="1" max="180" oninput="blocks['+i+'].min=+this.value;renderEditor()"><span class="dur-unit">МИН</span></div>'+
      '<button class="del-btn" onclick="removeBlock('+i+')">×</button>';
    list.appendChild(row);
  });
  updateTotal();
  renderAnalysis();
}
function addBlock(){ blocks.push({name:'',min:5,type:'calm'}); renderEditor();
  setTimeout(function(){var x=document.querySelectorAll('#blocks-list input[type="text"]');if(x.length)x[x.length-1].focus();},50); }
function removeBlock(i){ blocks.splice(i,1); renderEditor(); }
function updateTotal(){
  var t=blocks.reduce(function(s,b){return s+(+b.min||0);},0);
  document.getElementById('total-val').innerHTML=t+'<span class="u">мин</span>';
}

/* ───────── АНАЛИЗ ДИНАМИКИ ───────── */
function renderAnalysis(){
  var el=document.getElementById('analysis');
  // legend
  var legend='<div class="legend">'+TYPE_KEYS.map(function(k){
    return '<span class="legend-item"><span class="legend-dot" style="background:'+TYPES[k].color+'"></span>'+TYPES[k].label+'</span>';
  }).join('')+'</div>';

  if(!blocks.length){ el.innerHTML=legend+'<div class="hints"><div class="hint ok"><span class="ic">·</span> Добавь блоки или выбери пресет — здесь появится анализ нагрузки.</div></div>'; return; }

  // balance bar by total minutes per type
  var byType={active:0,calm:0,create:0,rest:0};
  blocks.forEach(function(b){ byType[b.type]=(byType[b.type]||0)+(+b.min||0); });
  var total=blocks.reduce(function(s,b){return s+(+b.min||0);},0)||1;
  var bar='<div class="balance-bar">'+TYPE_KEYS.map(function(k){
    var pct=(byType[k]/total)*100;
    return pct>0?'<div class="balance-seg" style="flex:'+byType[k]+';background:'+TYPES[k].color+'"></div>':'';
  }).join('')+'</div>';

  // hints
  var hints=[];
  var focus=AGES[currentAge].focus;

  // 1) длинные тяжёлые блоки
  blocks.forEach(function(b,i){
    if(TYPES[b.type].load>=1 && b.min>focus){
      hints.push({w:true,t:'Блок «'+(b.name||'№'+(i+1))+'» — '+b.min+' мин, дольше удержания внимания для возраста ('+focus+' мин). Разбей или добавь разрядку внутри.'});
    }
  });

  // 2) перегруз: подряд идёт суммарно много активной/умственной нагрузки без разрядки
  var since=0, flagged=false;
  blocks.forEach(function(b){
    if(b.type==='rest'){ since=0; }
    else { since+=(+b.min||0);
      if(since>focus*1.6 && !flagged){
        hints.push({w:true,t:'Долгий участок без разрядки (~'+since+' мин подряд). Вставь короткий блок «Разрядка», чтобы переключить внимание.'});
        flagged=true;
      }
    }
  });

  // 3) совсем нет разрядки при длинном занятии
  if(byType.rest===0 && total>focus*1.5){
    hints.push({w:true,t:'В занятии нет ни одной разрядки. Для удержания фокуса добавь хотя бы один блок типа «Разрядка».'});
  }

  // 4) три и более активных/умственных блока подряд одного типа
  var run=1;
  for(var i=1;i<blocks.length;i++){
    if(blocks[i].type===blocks[i-1].type && TYPES[blocks[i].type].load>=1){ run++; }
    else run=1;
    if(run>=3){
      hints.push({w:true,t:'Несколько однотипных блоков подряд («'+TYPES[blocks[i].type].label+'»). Чередуй типы, чтобы дети не уставали.'});
      break;
    }
  }

  if(!hints.length){ hints.push({w:false,t:'Баланс выглядит хорошо: нагрузка чередуется, длинных перегрузов нет.'}); }

  var hintsHtml='<div class="hints">'+hints.map(function(h){
    return '<div class="hint '+(h.w?'warn':'ok')+'"><span class="ic">'+(h.w?'!':'✓')+'</span><span>'+escHtml(h.t)+'</span></div>';
  }).join('')+'</div>';

  el.innerHTML=legend+bar+hintsHtml;
}

/* ───────── ПЕРЕКЛЮЧЕНИЕ ВИДОВ ───────── */
function showView(name){
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  document.getElementById(name+'-view').classList.add('active');
  document.getElementById('t-editor').classList.toggle('active', name==='editor');
  document.getElementById('t-timer').classList.toggle('active', name==='timer');
}

/* ───────── ТАЙМЕР ───────── */
function startTimer(){
  if(!blocks.length){alert('Добавь блоки или выбери пресет');return;}
  if(blocks.some(function(b){return !b.min||b.min<1;})){alert('Проверь длительности блоков');return;}
  if(ts&&ts.interval)clearInterval(ts.interval);
  ts={blockIdx:0,elapsed:0,paused:false,sessionElapsed:0,done:false,interval:null};
  ts.interval=setInterval(tick,1000); renderTimer(); showView('timer');
}
function tick(){
  if(!ts||ts.paused||ts.done)return;
  ts.elapsed++; ts.sessionElapsed++;
  var bs=blocks[ts.blockIdx].min*60;
  if(ts.elapsed>=bs){
    if(ts.blockIdx<blocks.length-1){ts.blockIdx++;ts.elapsed=0;}
    else{ts.done=true;clearInterval(ts.interval);}
  }
  renderTimer();
}
function nextBlock(){ if(ts&&ts.blockIdx<blocks.length-1){ts.blockIdx++;ts.elapsed=0;renderTimer();} }
function prevBlock(){ if(ts&&ts.blockIdx>0){ts.blockIdx--;ts.elapsed=0;renderTimer();} }
function togglePause(){ if(ts){ts.paused=!ts.paused;renderTimer();} }
function stopTimer(){ if(ts&&ts.interval)clearInterval(ts.interval); ts=null; var c=document.getElementById('timer-content'); c.className=''; showView('editor'); }

function renderTimer(){
  var c=document.getElementById('timer-content');
  if(!ts){c.innerHTML='';return;}
  if(ts.done){
    var total=blocks.reduce(function(s,b){return s+b.min;},0);
    c.className='';
    c.innerHTML=
      '<div class="done-screen">'+
        '<div class="done-mark">[ ✓ ]</div>'+
        '<div class="done-title">ЗАНЯТИЕ<br>ЗАВЕРШЕНО</div>'+
        '<div class="done-sub">Время в работе <b>'+fmt(ts.sessionElapsed)+'</b> / план <b>'+total+' мин</b></div>'+
        '<button class="done-btn" onclick="stopTimer()">← Вернуться к конструктору</button>'+
      '</div>'+
      footerStrip('DONE');
    return;
  }
  var bi=ts.blockIdx, el=ts.elapsed;
  var block=blocks[bi], bs=block.min*60, rem=bs-el, fill=(el/bs)*100;
  var tc = rem<=60?'urgent':rem<=120?'warn':'';
  var tp = TYPES[block.type]||TYPES.calm;

  var strip=blocks.map(function(b,i){
    var cls=i<bi?'done':i===bi?'active':'upcoming';
    var col=(TYPES[b.type]||TYPES.calm).color;
    var inner=i===bi?'<div class="ps-fill" style="width:'+fill+'%"></div>':'';
    return '<div class="ps-seg '+cls+'" style="--w:'+b.min+';background:'+col+'"><span class="ps-n">'+pad2(i+1)+'</span>'+inner+'</div>';
  }).join('');

  var queue=blocks.map(function(b,i){
    if(i===bi)return '';
    var cls=i<bi?'done-item':i===bi+1?'next':'';
    var mark=i<bi?'✓':i===bi+1?'»':'·';
    var col=(TYPES[b.type]||TYPES.calm).color;
    return '<div class="queue-item '+cls+'"><span class="qi-bar" style="background:'+col+'"></span><span class="qi-mark">'+mark+'</span><span class="qi-name">'+escHtml(b.name||'—')+'</span><span class="qi-dur">'+pad2(b.min)+' мин</span></div>';
  }).join('');

  c.className='layout-wide';
  c.innerHTML=
    '<div class="progress-strip">'+strip+'</div>'+
    '<div class="timer-meta"><span>Сессия <b>'+fmt(ts.sessionElapsed)+'</b></span><span>'+(ts.paused?'⏸ ПАУЗА':'● ИДЁТ')+'</span></div>'+
    '<div class="stage">'+
      '<div class="stage-tag"><span class="br">[</span> блок '+pad2(bi+1)+' / '+pad2(blocks.length)+' <span class="br">]</span></div>'+
      '<div class="stage-type" style="color:'+tp.color+'"><span class="legend-dot" style="background:'+tp.color+'"></span>'+tp.label+'</div>'+
      '<div class="stage-name">'+escHtml(block.name||'—')+'</div>'+
      '<div class="clock-row">'+
        '<div class="clock '+tc+'">'+fmt(rem)+'</div>'+
        '<div class="clock-side"><span class="of">из<b>'+pad2(block.min)+':00</b></span></div>'+
      '</div>'+
    '</div>'+
    '<div class="controls">'+
      '<button class="ctrl-btn" onclick="prevBlock()"'+(bi===0?' disabled':'')+'>← Пред</button>'+
      '<button class="ctrl-btn primary" onclick="togglePause()">'+(ts.paused?'▶ Продолжить':'⏸ Пауза')+'</button>'+
      '<button class="ctrl-btn" onclick="nextBlock()"'+(bi===blocks.length-1?' disabled':'')+'>След →</button>'+
    '</div>'+
    '<div class="queue-head">Очередь<span class="rule"></span></div>'+
    '<div class="queue">'+queue+'</div>'+
    '<div class="stop-wrap" style="padding:0 18px 14px;"><button class="ctrl-btn" style="width:100%;border:1.5px solid var(--ink);" onclick="stopTimer()">■ Стоп · Назад к конструктору</button></div>'+
    footerStrip('RUN');
}

function footerStrip(tag){ return '<div class="footer-strip"><span>УРОК / '+tag+'</span><div class="barcode">'+barcode()+'</div></div>'; }
function barcode(){ var s=''; for(var i=0;i<42;i++){ s+='<span style="width:'+(Math.random()>.5?2:1)+'px"></span>'; } return s; }

function updateLive(){
  var d=new Date();
  document.getElementById('live-clock').textContent=pad2(d.getHours())+':'+pad2(d.getMinutes());
  var months=['ЯНВ','ФЕВ','МАР','АПР','МАЙ','ИЮН','ИЮЛ','АВГ','СЕН','ОКТ','НОЯ','ДЕК'];
  document.getElementById('live-date').textContent=pad2(d.getDate())+' '+months[d.getMonth()]+' '+d.getFullYear();
}

/* ───────── INIT ───────── */
document.getElementById('barcode1').innerHTML=barcode();
updateLive(); setInterval(updateLive,10000);
renderCats(); renderPresets(); renderAges();
loadPreset('second','s45');

if('serviceWorker' in navigator && location.protocol.indexOf('http')===0){
  window.addEventListener('load',function(){ navigator.serviceWorker.register('./sw.js').catch(function(){}); });
}
</script>
